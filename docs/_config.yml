# Book settings
# Learn more at https://jupyter-book.readthedocs.io/v1/customize/config.html

title: Treams
author: Dominik Beutel, Elias Herzog, Jan David Fischbach

# Force re-execution of notebooks on each build.
# See https://jupyter-book.readthedocs.io/v1/content/execute.html
execute:
  execute_notebooks: cache
  timeout: -1
  allow_errors: false
  stderr_output: "remove-warn"
  # execute_notebooks: force
  # execute_notebooks: "off"

exclude_patterns: ['.venv', 'examples', '_templates', 'sphinx_extensions']

latex:
  latex_engine: pdflatex # one of 'pdflatex', 'xelatex' (recommended for unicode), 'luatex', 'platex', 'uplatex'
  use_jupyterbook_latex: true # use sphinx-jupyterbook-latex for pdf builds as default

# Add a bibtex file so that we can create citations

html:
  home_page_in_navbar: true
  use_edit_page_button: true
  use_repository_button: true
  use_issues_button: true
  baseurl: https://tfp-photonics.github.io/treams/

# Information about where the book exists on the web
repository:
  url: https://github.com/jan-david-fischbach/treams
  path_to_book: docs # Optional path to your book, relative to the repository root
  branch: main # Which branch of the repository should be used when creating links (optional)

launch_buttons:
  thebe: true

sphinx:
  extra_extensions:
    - "sphinx.ext.autodoc"
    - "sphinx.ext.todo"
    - "sphinx.ext.doctest"
    - "sphinx.ext.autodoc.typehints"
    - "sphinx.ext.autosummary"
    - "sphinx.ext.napoleon"
    - "sphinx.ext.mathjax"
    - "sphinx_math_dollar"
    - "sphinx.ext.viewcode"
    - "matplotlib.sphinxext.plot_directive"
    - "sphinx.ext.autosectionlabel"
    - "sphinx.ext.coverage"
    - "sphinx.ext.intersphinx"
  local_extensions:
    sphinx_extensions.signature_override: "."
    sphinx_extensions.numpy_printoptions: "."
  config:
    nb_execution_show_tb: True
    nb_execution_raise_on_error: True
    nb_custom_formats:
        .py:
            - jupytext.reads
            - fmt: py
    autodoc_typehints: description
    autosummary_generate: True
    autosummary_filename_map:
        treams.Lattice: treams.Lattice_class
        treams.Lattice.reciprocal: treams.Lattice_class.reciprocal
        treams.Lattice.volume: treams.Lattice_class.volume
    intersphinx_mapping:
        scipy: ["https://docs.scipy.org/doc/scipy", null]
        numpy: ["https://numpy.org/doc/stable", null]
    autosectionlabel_prefix_document: True
    doctest_global_setup: "import numpy as np; from treams import *"

parse:
  myst_enable_extensions:  # default extensions to enable in the myst parser. See https://myst-parser.readthedocs.io/en/latest/using/syntax-optional.html
    # - amsmath
    - colon_fence
    # - deflist
    - dollarmath
    # - html_admonition
    # - html_image
    - linkify
    # - replacements
    # - smartquotes
    - substitution
    - tasklist
  myst_url_schemes: [mailto, http, https] # URI schemes that will be recognised as external URLs in Markdown links
  myst_dmath_double_inline: true  # Allow display math ($$) within an inline context
